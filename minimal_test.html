<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Minimal WASM Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        
        h1 {
            color: #333;
        }
        
        .info {
            background-color: #e3f2fd;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Minimal WASM Test</h1>
    <div class="info">
        <p>This page tests basic WASM functionality without rui.</p>
        <p>Check the browser console for messages and look below for dynamic content.</p>
    </div>

    <script type="module">
        import init, { greet } from './minimal_wasm/pkg/minimal_wasm.js';
        
        async function run() {
            try {
                console.log('Loading minimal WASM module...');
                
                // Initialize the WASM module
                await init();
                
                console.log('WASM module loaded successfully!');
                
                // Call a function from the WASM module
                greet('Browser');
                
                // Add success message
                const successDiv = document.createElement('div');
                successDiv.innerHTML = `
                    <h2>✅ Success!</h2>
                    <p>Minimal WASM module loaded and executed successfully.</p>
                    <p>The content above was added by Rust code running in WebAssembly.</p>
                `;
                successDiv.style.backgroundColor = '#e8f5e8';
                successDiv.style.padding = '15px';
                successDiv.style.marginTop = '20px';
                successDiv.style.borderRadius = '5px';
                successDiv.style.border = '2px solid #4caf50';
                document.body.appendChild(successDiv);
                
            } catch (error) {
                console.error('Error loading WASM module:', error);
                
                const errorDiv = document.createElement('div');
                errorDiv.innerHTML = `
                    <h2>❌ Error</h2>
                    <p><strong>Failed to load WASM module:</strong></p>
                    <pre>${error.message}</pre>
                    <p>Check the browser console for more details.</p>
                `;
                errorDiv.style.backgroundColor = '#ffebee';
                errorDiv.style.padding = '15px';
                errorDiv.style.marginTop = '20px';
                errorDiv.style.borderRadius = '5px';
                errorDiv.style.border = '2px solid #f44336';
                document.body.appendChild(errorDiv);
            }
        }
        
        run();
    </script>
</body>
</html>
